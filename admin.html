<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>管理後台｜AI 選股擂台</title>
<link rel="stylesheet" href="assets/style.css" />
<style>
  form{ display:flex; flex-direction:column; gap:12px; max-width: 640px; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  label{ font-size:12px; color:var(--text-dim); display:flex; flex-direction:column; gap:6px; }
  input, select, textarea{
    background: var(--surface-2); border:1px solid var(--border); color: var(--text);
    padding: 10px 12px; border-radius:8px; font-size:14px; font-family:'Inter',sans-serif;
  }
  textarea{ min-height:180px; font-family:'JetBrains Mono',monospace; resize:vertical; }
  .status{ font-size:13px; margin-top:6px; }
  .status.ok{ color: var(--up); }
  .status.err{ color: var(--down); }
  .warn{ background: rgba(248,113,113,0.1); border:1px solid var(--down); color:#fecaca; padding:12px 16px; border-radius:10px; font-size:13px; margin-bottom:20px; }
  .current-holdings{ font-size:12px; color:var(--text-dim); margin-top:-4px; }
  nav.admin-tabs{ margin-bottom:20px; width:fit-content; }
</style>
</head>
<body>

<header class="site">
  <div class="wrap bar">
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1>管理後台</h1>
        <span>新增交易紀錄・貼上週報，會直接寫回 GitHub</span>
      </div>
    </div>
    <nav class="tabs"><a class="btn" href="index.html">回到總覽</a></nav>
  </div>
</header>

<main class="wrap">

  <div class="warn">
    ⚠️ 這個頁面需要你的 GitHub Token 才能寫入資料，Token 只會存在「這台瀏覽器」的 localStorage，不會上傳到任何地方。
    請使用權限僅限這個 repo、且只有 Contents 讀寫權限的 <b>fine-grained token</b>，並且不要把這個 admin.html 的連結分享給別人。
  </div>

  <nav class="tabs admin-tabs">
    <button data-admintab="connect" class="active">連線與帳本設定</button>
    <button data-admintab="tx">交易紀錄</button>
    <button data-admintab="journal">週報管理</button>
  </nav>

  <section id="admintab-connect" class="active">

  <div class="block">
    <h2><span class="sw"></span>GitHub 連線設定</h2>
    <form id="settings-form">
      <div class="row2">
        <label>Repo 擁有者(帳號名稱) <input id="cfg-owner" placeholder="例如 yourname" required></label>
        <label>Repo 名稱 <input id="cfg-repo" placeholder="例如 ai-stock-arena" required></label>
      </div>
      <div class="row2">
        <label>分支 <input id="cfg-branch" placeholder="main" value="main" required></label>
        <label>Personal Access Token <input id="cfg-token" type="password" placeholder="github_pat_..." required></label>
      </div>
      <div>
        <button type="submit" class="btn primary">儲存設定</button>
        <span id="settings-status" class="status"></span>
      </div>
    </form>
  </div>

  <div class="block">
    <h2><span class="sw"></span>帳本設定</h2>
    <form id="config-form">
      <div class="row2">
        <label>起始本金(每個 AI) <input id="cfg-capital" type="number" min="0" required></label>
        <label>競賽起始日 <input id="cfg-start-date" type="date" required></label>
      </div>
      <div class="row2">
        <label>大盤基準代號 <input id="cfg-benchmark" placeholder="例如 0050" required></label>
      </div>
      <div class="row2">
        <label>買進手續費率(例如 0.001425) <input id="cfg-buy-fee" type="number" step="0.000001" min="0" required></label>
        <label>賣出手續費率 <input id="cfg-sell-fee" type="number" step="0.000001" min="0" required></label>
      </div>
      <label>證券交易稅率(一般為 0.003) <input id="cfg-sell-tax" type="number" step="0.000001" min="0" required></label>
      <div>
        <button type="submit" class="btn primary">更新設定</button>
        <span id="config-status" class="status"></span>
      </div>
    </form>
  </div>

  </section>

  <section id="admintab-tx">

  <div class="block">
    <h2><span class="sw"></span>新增進出場紀錄</h2>
    <form id="tx-form">
      <input type="hidden" id="tx-editing-index" value="">
      <div class="row2">
        <label>AI
          <select id="tx-ai" required></select>
        </label>
        <label>週次(第幾週)
          <input id="tx-week" type="number" min="1" required>
        </label>
      </div>
      <div class="row2">
        <label>日期
          <input id="tx-date" type="date" required>
        </label>
        <label>動作
          <select id="tx-action">
            <option value="buy">買進</option>
            <option value="sell">賣出</option>
          </select>
        </label>
      </div>
      <div class="row2">
        <label>股票代號 (輸入後自動帶入名稱) <input id="tx-ticker" placeholder="例如 2330" required></label>
        <label>股票名稱 <input id="tx-name" placeholder="例如 台積電"></label>
      </div>
      <div class="row2">
        <label>股數 <input id="tx-shares" type="number" min="1" required></label>
        <label>成交價 <input id="tx-price" type="number" step="0.01" min="0" required></label>
      </div>
      <label>備註(選填) <input id="tx-note" placeholder="調整原因、AI 選股理由摘要..."></label>
      <div class="current-holdings" id="tx-current-holdings"></div>
      <div>
        <button type="submit" class="btn primary" id="tx-submit-btn">寫入 GitHub</button>
        <button type="button" class="btn" id="tx-cancel-edit" style="display:none">取消編輯</button>
        <span id="tx-status" class="status"></span>
      </div>
    </form>
  </div>

  <div class="block">
    <h2><span class="sw"></span>交易紀錄管理</h2>
    <div class="filters">
      <select id="tx-manage-filter">
        <option value="">全部 AI</option>
      </select>
    </div>
    <div style="overflow-x:auto">
      <table id="tx-manage-table">
        <thead><tr><th>日期</th><th>AI</th><th>週次</th><th>動作</th><th>股票</th><th>股數</th><th>價格</th><th></th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  </section>

  <section id="admintab-journal">

  <div class="block">
    <h2><span class="sw"></span>貼上週報 / 覆盤分析</h2>
    <form id="journal-form">
      <input type="hidden" id="j-editing-index" value="">
      <div class="row2">
        <label>AI
          <select id="j-ai" required></select>
        </label>
        <label>週次
          <input id="j-week" type="number" min="1" required>
        </label>
      </div>
      <div class="row2">
        <label>日期 <input id="j-date" type="date" required></label>
        <label>標題 <input id="j-title" placeholder="例如：第1週回顧與換股邏輯"></label>
      </div>
      <label>內容(可直接貼上 AI 回覆的文字，支援 Markdown：標題、粗體、表格、清單)
        <textarea id="j-content" placeholder="貼上這週的選股邏輯、績效檢討、下週調整方向..."></textarea>
      </label>
      <div>
        <button type="submit" class="btn primary" id="j-submit-btn">寫入 GitHub</button>
        <button type="button" class="btn" id="j-cancel-edit" style="display:none">取消編輯</button>
        <span id="j-status" class="status"></span>
      </div>
    </form>
  </div>

  <div class="block">
    <h2><span class="sw"></span>週報管理</h2>
    <div class="filters">
      <select id="journal-manage-filter">
        <option value="">全部 AI</option>
      </select>
    </div>
    <div id="journal-manage-list"></div>
  </div>

  </section>

</main>

<script src="assets/admin.js"></script>
</body>
</html>
